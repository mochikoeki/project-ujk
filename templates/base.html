<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sora Seventh{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full bg-white border-b border-gray-100 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-bold">Sora Seventh</a>
            <div class="flex gap-6 text-sm">
                <a href="/" class="hover:text-blue-600">Home</a>
                <a href="/artikel" class="hover:text-blue-600">Blog</a>
            </div>
        </div>
    </nav>

    <!-- Konten utama -->
    <main class="pt-16">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="mt-20 border-t border-gray-100 py-8 text-center text-sm text-gray-400">
        &copy; 2026 Sora Seventh. All rights reserved.
    </footer>

</body>
</html>
