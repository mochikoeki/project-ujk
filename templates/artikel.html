{% extends 'base.html' %}
{% block title %}Blog — Sora Seventh{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto px-6 py-20">
    <h1 class="text-4xl font-bold mb-12">Blog</h1>
    <div class="flex flex-col gap-6">
        {% for artikel in artikels %}
        <a href="/artikel/{{ artikel.id }}" class="group border border-gray-100 rounded-2xl p-6 hover:border-gray-300 transition">
            <p class="text-xs text-gray-400 mb-2">{{ artikel.tanggal.strftime('%d %B %Y') }}</p>
            <h2 class="text-xl font-bold mb-2 group-hover:text-blue-600">{{ artikel.judul }}</h2>
            <p class="text-gray-500 text-sm">{{ artikel.isi[:150] }}...</p>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
